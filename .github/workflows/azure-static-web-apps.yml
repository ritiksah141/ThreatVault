name: Deploy ThreatVault Frontend to Azure Storage

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload to Blob Storage
        uses: azure/CLI@v2
        with:
          inlineScript: |
            # Upload index.html and config.js to the special '$web' container
            # We use --overwrite true to ensure updates are applied
            az storage blob upload-batch \
              --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
              --auth-mode key \
              -d '$web' -s . \
              --pattern "index.html" --overwrite true
            
            az storage blob upload-batch \
              --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
              --auth-mode key \
              -d '$web' -s . \
              --pattern "config.js" --overwrite true
